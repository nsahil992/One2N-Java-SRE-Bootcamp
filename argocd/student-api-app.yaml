apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/nsahil992/One2N-Java-SRE-Bootcamp.git
    targetRevision: master
    path: helm/student-api

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: student-api

  syncPolicy:
    automated:
      prune: true
      selfHeal: true