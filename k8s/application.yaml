# ----- Application Namespace -----

apiVersion: v1
kind: Namespace
metadata:
  name: student-api

---

# ----- ConfigMap: Non-sensitive env vars -----

apiVersion: v1
kind: ConfigMap
metadata:
  name: student-api-config
  namespace: student-api
data:
  PORT: "8080"
  DB_HOST: "student-db"
  DB_PORT: "5432"
  DB_NAME: "studentdb"

---

# ----- Application Deployment -----

apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-api
  template:
    metadata:
      labels:
        app: student-api
    spec:
      nodeSelector:
        type: application

      initContainers:
        - name: wait-for-db
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h student-db -p 5432 -U $POSTGRES_USER; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database ready"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: student-api-secret
                  key: POSTGRES_USER

      containers:
        - name: student-api
          image: nsahil992/student-api:2.0.0
          ports:
            - containerPort: 8080

          env:
            - name: DB_URL
              value: jdbc:postgresql://student-db:5432/studentdb

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: student-api-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-api-secret
                  key: POSTGRES_PASSWORD

          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 8080

          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 8080

---

# ----- Application Service -----

apiVersion: v1
kind: Service
metadata:
  name: student-api-service
  namespace: student-api
spec:
  selector:
    app: student-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
