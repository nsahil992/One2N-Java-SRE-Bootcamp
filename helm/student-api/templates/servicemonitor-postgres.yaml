apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter-monitor
  namespace: observability
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: postgres-exporter

  namespaceSelector:
    matchNames:
      - observability

  endpoints:
    - port: http
      path: /metrics
      interval: 15s