# Persistent Volume

apiVersion: v1
kind: PersistentVolume
metadata:
  name: student-api-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: {{ .Values.db.persistence.path }}

---

# Persistent Volume Claim

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: student-api-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.persistence.storage }}
  storageClassName: {{ .Values.db.persistence.storageClassName }}