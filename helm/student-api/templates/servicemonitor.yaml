apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: student-api-monitor
  namespace: observability
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: student-api

  namespaceSelector:
    matchNames:
      - student-api

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s