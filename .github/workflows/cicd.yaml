name: Student API CI/CD Pipeline

permissions:
  contents: write

on:
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "Makefile"
      - "helm/**"

  push:
    branches:
      - master
      - lvl04
      - lvl05
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "Makefile"
      - "helm/**"

  workflow_dispatch:

jobs:

  CI:
    name: Continuous Integration (build-test-lint-docker)
    runs-on: self-hosted

    env:
      VERSION: ${{ secrets.SEMVER_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API
        run: make build

      - name: Run unit tests
        run: make test

      - name: Run lint
        run: make lint

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build test and push Docker image
        run: |
          make docker-test
          make docker-build VERSION=${VERSION}
          make docker-push VERSION=${VERSION}

  CD:
    name: Continuous Deployment (Helm + Git Push)
    runs-on: self-hosted
    needs: CI

    if: github.ref == 'refs/heads/master'

    env:
      VERSION: ${{ secrets.SEMVER_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Helm chart image tag
        run: |
          sed -i '' "s/tag:.*/tag: \"${VERSION}\"/" helm/student-api/values.yaml

      - name: Git commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add helm/student-api/values.yaml
          git commit -m "ci: update image tag to ${VERSION} [skip ci]" || echo "No changes"

          git push origin master